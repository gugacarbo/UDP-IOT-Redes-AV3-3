; PlatformIO Project Configuration File

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino

lib_deps =
  ESP32Async/ESP Async WebServer@^3.6.0 # Servidor web assíncrono
  ESP32Async/AsyncTCP@^3.3.2             # TCP assíncrono (para WebSocket)
  bblanchon/ArduinoJson@^7.4.3           # Parser JSON leve
